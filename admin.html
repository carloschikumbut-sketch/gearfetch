<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEAR FETCH | Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin-style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <nav class="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-sneaker"></i> GEAR<span>FETCH</span>
            <button class="close-sidebar" onclick="toggleSidebar()">&times;</button>
        </div>
        <div class="nav-links">
            <a href="admin.html" class="nav-item active"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
            <a href="inventory.html" class="nav-item"><i class="fa-solid fa-box"></i> Products</a>
            <a href="orders.html" class="nav-item"><i class="fa-solid fa-receipt"></i> Orders</a>
            <a href="customers.html" class="nav-item"><i class="fa-solid fa-users"></i> Customers</a>
            <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
            <div class="nav-divider"></div>
            <a href="index.html" class="nav-item"><i class="fa-solid fa-eye"></i> View Store</a>
        </div>

        <div class="sidebar-footer p-4 border-t border-white/5 mt-auto">
        <button onclick="handleLogout()" class="nav-item w-full flex items-center gap-3 text-red-500 hover:bg-red-500/10 transition-colors p-3 rounded-xl font-bold uppercase text-[10px] tracking-widest">
            <i class="fa-solid fa-right-from-bracket"></i> 
            Logout 
        </button>
    </div>
    </nav>

    <main class="main-content">
        <header class="admin-header">
            <div class="header-left">
                <button class="mobile-toggle" onclick="toggleSidebar()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h1>Analytics Overview</h1>
            </div>
            <div class="admin-actions">
                <button class="btn-secondary">Last 30 Days</button>
                <button class="btn-primary" onclick="window.print()">Print</button>
            </div>
        </header>

        <section class="kpi-container">
            <div class="card kpi-card">
                <p class="card-label">Total Sales</p>
                <h2 id="total-sales">$0.00</h2>
                <span class="trend up">+14.2%</span>
            </div>
            <div class="card kpi-card">
                <p class="card-label">Orders</p>
                <h2 id="total-orders">0</h2>
                <span class="trend down">-2.1%</span>
            </div>
            <div class="card kpi-card">
                <p class="card-label">Average Order Value</p>
                <h2 id="aov">$0.00</h2>
            </div>
        </section>

        <section class="charts-grid">
            <div class="card chart-card">
                <h3>Sales Performance</h3>
                <canvas id="salesLineChart"></canvas>
            </div>

            <div class="card chart-card">
                <h3>Orders by Location</h3>
                <canvas id="locationPieChart"></canvas>
            </div>
            
            <div class="card chart-card">
                <h3>Top Selling Sneakers</h3>
                <canvas id="topProductsBarChart"></canvas>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script> 
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/env.js"></script>
    <script src="js/supabase-config.js"></script>
    
    <script>

// ADD THIS TO THE TOP OF YOUR ADMIN PANEL SCRIPT
async function protectRoute() {
    const { data: { session } } = await window._supabase.auth.getSession();
    if (!session) {
        // Not logged in? Boot them out.
        window.location.href = 'admin-login.html';
    }
}
protectRoute();


/**
     * 2. LOGOUT LOGIC
     * Clears the Supabase session and redirects
     */
    async function handleLogout() {
        // Confirmation is better for admin actions to prevent accidents
        if (confirm("Log out of the Admin Panel?")) {
            const { error } = await window._supabase.auth.signOut();
            
            if (error) {
                console.error("Logout Error:", error.message);
                alert("Error during logout. Please try again.");
            } else {
                // Clear local storage and send to login
                window.location.href = 'admin-login.html';
            }
        }
    }

        // 3. MOBILE SIDEBAR LOGIC
        function toggleSidebar() {
            document.body.classList.toggle('sidebar-open');
        }

        // --- Your existing Analytics Logic (Keep this) ---
        async function initAnalytics() {
            const { data: orders, error } = await window._supabase.from('orders').select('*');
            if (error) { console.error("Analytics Error:", error.message); return; }

            const fulfilledOrders = orders.filter(o => ['shipped', 'delivered'].includes(o.status?.toLowerCase()));
            
            const totalOrdersCount = fulfilledOrders.length;
            const totalSalesSum = fulfilledOrders.reduce((sum, order) => sum + parseFloat(order.total_price || 0), 0);
            const aovValue = totalOrdersCount > 0 ? (totalSalesSum / totalOrdersCount) : 0;

            document.getElementById('total-sales').innerText = `$${totalSalesSum.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('total-orders').innerText = totalOrdersCount;
            document.getElementById('aov').innerText = `$${aovValue.toFixed(2)}`;

            renderSalesChart(fulfilledOrders);
            renderTopProductsChart(fulfilledOrders);
            renderLocationChart(fulfilledOrders);
        }

function renderSalesChart(data) {
    const ctx = document.getElementById('salesLineChart').getContext('2d');
    const salesByDate = {};
    
    data.sort((a, b) => new Date(a.created_at) - new Date(b.created_at)); // Ensure chronological order

    data.forEach(order => {
        const date = new Date(order.created_at).toLocaleDateString();
        salesByDate[date] = (salesByDate[date] || 0) + parseFloat(order.total_price);
    });

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: Object.keys(salesByDate),
            datasets: [{
                label: 'Confirmed Revenue ($)',
                data: Object.values(salesByDate),
                borderColor: '#10b981',
                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: { responsive: true }
    });
}

function renderLocationChart(data) {
    const ctx = document.getElementById('locationPieChart').getContext('2d');
    const locationCounts = {};

    data.forEach(order => {
        const loc = order.location ? order.location.split('(')[0].trim() : 'Unknown'; 
        locationCounts[loc] = (locationCounts[loc] || 0) + 1;
    });

    new Chart(ctx, {
        type: 'doughnut',
        // Register the datalabels plugin
        plugins: [ChartDataLabels], 
        data: {
            labels: Object.keys(locationCounts),
            datasets: [{
                data: Object.values(locationCounts),
                backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#6366f1', '#000000'],
                borderWidth: 2,
                borderColor: '#ffffff'
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' },
                // --- NEW: Data Label Formatting ---
                datalabels: {
                    color: '#fff',
                    font: { weight: 'bold', size: 14 },
                    formatter: (value) => {
                        // This displays the raw number of orders
                        return value; 
                    }
                }
            }
        }
    });
}

function renderTopProductsChart(data) {
    const ctx = document.getElementById('topProductsBarChart').getContext('2d');
    const productCounts = {};

    data.forEach(order => {
        if (Array.isArray(order.items)) {
            order.items.forEach(item => {
                productCounts[item.name] = (productCounts[item.name] || 0) + (item.quantity || 1);
            });
        }
    });

    const sorted = Object.entries(productCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: sorted.map(p => p[0]),
            datasets: [{
                label: 'Pairs Delivered',
                data: sorted.map(p => p[1]),
                backgroundColor: '#000000'
            }]
        },
        options: { 
            indexAxis: 'y',
            responsive: true 
        }
    });
}

document.addEventListener('DOMContentLoaded', initAnalytics);
</script>
    
</body>
</html>
