<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password | Gear Fetch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-white flex items-center justify-center min-h-screen">

    <div class="max-w-sm w-full p-6">
        <h1 class="text-xl font-black uppercase tracking-widest mb-6">Set New Password</h1>
        
        <input type="password" id="new-password" placeholder="New Password" class="w-full p-3 border border-zinc-200 rounded-lg mb-4 text-sm">
        
        <button onclick="updatePassword()" class="w-full bg-black text-white py-3 rounded-lg hover:bg-zinc-800 transition-all text-[10px] font-bold uppercase tracking-widest">
            Update Password
        </button>
    </div>

   <script src="js/env.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Use the variables defined in js/env.js
        const client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

     async function updatePassword() {
    const btn = document.querySelector('button'); // Selects your button
    const newPassword = document.getElementById('new-password').value;
    
    if (newPassword.length < 6) {
        alert("Password must be at least 6 characters long.");
        return;
    }

    // Disable button to prevent double-clicks
    btn.disabled = true;
    btn.innerText = "Updating...";

    const { data, error } = await client.auth.updateUser({
        password: newPassword
    });

    if (error) {
        alert("Error: " + error.message);
        btn.disabled = false;
        btn.innerText = "Update Password";
    } else {
        alert("Password updated successfully!");
        window.location.href = 'profile.html';
    }
}
    </script>
</body>
</html>
