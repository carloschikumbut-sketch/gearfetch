<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register | GEAR FETCH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            background-color: #000000; /* Black Theme Base */
        }
        
        /* High-End Modal */
        .auth-modal {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(220, 38, 38, 0.15); /* Subtle Red Glow */
            overflow: hidden;
            width: 100%;
            max-width: 420px; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Tab Underline */
        .tab-underline {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background-color: #dc2626; /* Brand Red */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Input Styling */
        .input-group {
            position: relative;
            background-color: #f8f8f8;
            border: 1px solid #eeeeee;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .input-group:focus-within {
            border-color: #000000;
            background-color: #ffffff;
            box-shadow: 0 0 0 1px #000000;
        }
        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 14px;
        }
        .auth-input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: transparent;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: #000;
        }
        .auth-input:focus { outline: none; }
        .auth-input::placeholder { color: #cbd5e1; }

        /* Eye Icon */
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            cursor: pointer;
            padding: 4px;
        }

        /* Slide Animation */
        .form-container {
            display: flex;
            width: 200%;
            transition: transform 0.6s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .form-panel {
            width: 100%;
            padding: 2.5rem 2rem;
        }

        /* Mobile Optimization */
        @media (max-width: 640px) {
            .auth-modal {
                max-width: 100%;
                border-radius: 0;
                min-height: 100vh;
            }
            body { background-color: white; }
        }

        .tab-active { color: #dc2626 !important; }

        /* Loading Overlay */
        #loading-gate {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center sm:p-6">

    <div id="loading-gate">
        <div class="animate-pulse flex flex-col items-center">
            <h1 class="text-white text-2xl font-black italic tracking-tighter uppercase">GEAR<span class="text-red-600">FETCH</span></h1>
            <div class="mt-4 w-12 h-[2px] bg-red-600"></div>
        </div>
    </div>

    <div class="auth-modal">
        <div class="pt-8 pb-2 text-center">
            <h1 class="text-2xl font-black italic tracking-tighter uppercase">GEAR<span class="text-red-600">FETCH</span></h1>
            <p class="text-[9px] font-bold text-zinc-400 uppercase tracking-[0.3em] mt-1"></p>
        </div>

        <div class="relative flex border-b border-zinc-100 mt-4">
            <button id="tab-signin" onclick="switchForm('signin')" class="flex-1 py-5 text-[11px] font-black uppercase tracking-widest tab-active transition-colors">Sign In</button>
            <button id="tab-signup" onclick="switchForm('signup')" class="flex-1 py-5 text-[11px] font-black uppercase tracking-widest text-zinc-400 transition-colors">Register</button>
            <div id="tab-indicator" class="tab-underline w-1/2"></div>
        </div>

        <div id="form-slider" class="form-container">
            <div class="form-panel space-y-6">
                <div class="space-y-4">
                    <div class="input-group">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="login-email" placeholder="Email Address" class="auth-input">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="login-password" placeholder="Password" class="auth-input">
                        <i id="eye-login" onclick="togglePass('login-password', 'eye-login')" class="fa-solid fa-eye-slash toggle-password"></i>
                    </div>
                </div>

                <div class="flex justify-between items-center px-1">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" checked class="accent-red-600 w-3 h-3">
                        <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-tighter">Remember me</span>
                    </label>
                    <a href="#" class="text-[10px] font-bold text-red-600 uppercase tracking-tighter hover:underline">Forgot?</a>
                </div>

                <button onclick="handleLogin()" id="btn-login" class="w-full bg-black text-white py-4 rounded-lg text-[11px] font-black uppercase tracking-[0.2em] hover:bg-zinc-800 transition-all shadow-xl shadow-black/10">
                    Sign In
                </button>

                <div class="relative flex py-4 items-center">
                    <div class="flex-grow border-t border-zinc-100"></div>
                    <span class="flex-shrink mx-4 text-[9px] font-bold text-zinc-300 uppercase tracking-widest">Social Access</span>
                    <div class="flex-grow border-t border-zinc-100"></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button class="flex items-center justify-center gap-2 py-3 border border-zinc-100 rounded-lg hover:bg-zinc-50 transition-colors text-[10px] font-bold uppercase tracking-widest">
                        <i class="fa-brands fa-google text-red-600"></i> Google
                    </button>
                    <button class="flex items-center justify-center gap-2 py-3 border border-zinc-100 rounded-lg hover:bg-zinc-50 transition-colors text-[10px] font-bold uppercase tracking-widest">
                        <i class="fa-brands fa-apple"></i> Apple
                    </button>
                </div>
            </div>

            <div class="form-panel space-y-6">
                <div class="space-y-4">
                    <div class="input-group">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" id="reg-name" placeholder="Full Name" class="auth-input">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="reg-email" placeholder="Email Address" class="auth-input">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="reg-password" placeholder="Create Password" class="auth-input">
                        <i id="eye-reg" onclick="togglePass('reg-password', 'eye-reg')" class="fa-solid fa-eye-slash toggle-password"></i>
                    </div>
                </div>
                
                <p class="text-[10px] text-zinc-400 text-center leading-relaxed px-4">
    By joining, you agree to our 
    <a href="returns.html" class="text-black font-bold underline hover:opacity-70 transition-opacity">
        Terms of Service
    </a>.
</p>
                
                <button onclick="handleRegister()" id="btn-reg" class="w-full bg-red-600 text-white py-4 rounded-lg text-[11px] font-black uppercase tracking-[0.2em] hover:bg-red-700 transition-all shadow-xl shadow-red-600/20">
                    Create Account
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        const client = window._supabase;
        const slider = document.getElementById('form-slider');
        const indicator = document.getElementById('tab-indicator');
        const loader = document.getElementById('loading-gate');

        // Check Session Immediately on load
        async function checkSession() {
            const { data: { session } } = await client.auth.getSession();
            
            if (session) {
                // User is already logged in, skip the form
                window.location.href = 'profile.html';
            } else {
                // No session, hide loader and show login
                loader.style.display = 'none';
            }
        }

        function switchForm(type) {
            const isSignIn = type === 'signin';
            const signinTab = document.getElementById('tab-signin');
            const signupTab = document.getElementById('tab-signup');

            if (isSignIn) {
                slider.style.transform = "translateX(0%)";
                indicator.style.left = "0%";
                signinTab.classList.add('tab-active');
                signupTab.classList.remove('tab-active');
            } else {
                slider.style.transform = "translateX(-50%)";
                indicator.style.left = "50%";
                signupTab.classList.add('tab-active');
                signinTab.classList.remove('tab-active');
            }
        }

        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-solid fa-eye toggle-password';
            } else {
                input.type = 'password';
                icon.className = 'fa-solid fa-eye-slash toggle-password';
            }
        }

        async function handleLogin() {
            const btn = document.getElementById('btn-login');
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            if(!email || !password) return;

            btn.disabled = true;
            btn.innerText = "VERIFYING...";
            
            const { data, error } = await client.auth.signInWithPassword({ email, password });
            
            if (error) { 
                alert(error.message); 
                btn.innerText = "SIGN INTO VAULT"; 
                btn.disabled = false;
            } else {
                window.location.href = 'profile.html';
            }
        }

        async function handleRegister() {
            const btn = document.getElementById('btn-reg');
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const name = document.getElementById('reg-name').value;
            if(!email || !password || !name) return;

            btn.disabled = true;
            btn.innerText = "PREPARING VAULT...";
            
            const { data, error } = await client.auth.signUp({
                email, 
                password, 
                options: { data: { full_name: name } }
            });

            if (error) { 
                alert(error.message); 
                btn.innerText = "CREATE ACCOUNT"; 
                btn.disabled = false;
            } else {
                alert("Success! Check your email for verification if enabled, or sign in now."); 
                switchForm('signin');
                btn.innerText = "CREATE ACCOUNT";
                btn.disabled = false;
            }
        }

        // Initialize session check
        document.addEventListener('DOMContentLoaded', checkSession);
    </script>
</body>
</html>
