        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            background-color: #000000; /* Black Theme Base */
        }
        
        /* High-End Modal */
        .auth-modal {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(220, 38, 38, 0.15); /* Subtle Red Glow */
            overflow: hidden;
            width: 100%;
            max-width: 420px; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Tab Underline */
        .tab-underline {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background-color: #dc2626; /* Brand Red */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Input Styling */
        .input-group {
            position: relative;
            background-color: #f8f8f8;
            border: 1px solid #eeeeee;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .input-group:focus-within {
            border-color: #000000;
            background-color: #ffffff;
            box-shadow: 0 0 0 1px #000000;
        }
        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 14px;
        }
        .auth-input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: transparent;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: #000;
        }
        .auth-input:focus { outline: none; }
        .auth-input::placeholder { color: #cbd5e1; }

        /* Eye Icon */
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            cursor: pointer;
            padding: 4px;
        }

        /* Slide Animation */
        .form-container {
            display: flex;
            width: 200%;
            transition: transform 0.6s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .form-panel {
            width: 100%;
            padding: 2.5rem 2rem;
        }

        /* Mobile Optimization */
        @media (max-width: 640px) {
            .auth-modal {
                max-width: 100%;
                border-radius: 0;
                min-height: 100vh;
            }
            body { background-color: white; }
        }

        .tab-active { color: #dc2626 !important; }

        /* Loading Overlay */
        #loading-gate {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/env.js"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        const client = window._supabase;
        const slider = document.getElementById('form-slider');
        const indicator = document.getElementById('tab-indicator');
        const loader = document.getElementById('loading-gate');


        const sanitize = (str) => str.replace(/<[^>]*>?/gm, '');

        // Check Session Immediately on load
        async function checkSession() {
            const { data: { session } } = await client.auth.getSession();
            
            if (session) {
                // User is already logged in, skip the form
                window.location.href = 'profile.html';
            } else {
                // No session, hide loader and show login
                loader.style.display = 'none';
            }
        }

        function switchForm(type) {
            const isSignIn = type === 'signin';
            const signinTab = document.getElementById('tab-signin');
            const signupTab = document.getElementById('tab-signup');

            if (isSignIn) {
                slider.style.transform = "translateX(0%)";
                indicator.style.left = "0%";
                signinTab.classList.add('tab-active');
                signupTab.classList.remove('tab-active');
            } else {
                slider.style.transform = "translateX(-50%)";
                indicator.style.left = "50%";
                signupTab.classList.add('tab-active');
                signinTab.classList.remove('tab-active');
            }
        }

        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-solid fa-eye toggle-password';
            } else {
                input.type = 'password';
                icon.className = 'fa-solid fa-eye-slash toggle-password';
            }
        }

        async function handleLogin() {
            const btn = document.getElementById('btn-login');
            const email = sanitize(document.getElementById('login-email').value.trim());
            const password = document.getElementById('login-password').value;

            
            if (!email || password.length < 8) {
            alert("Please enter a valid email and a password of at least 8 characters.");
            return;
           }

            btn.disabled = true;
            btn.innerText = "AUTHENTICATING...";
            
            try {
                const { error } = await client.auth.signInWithPassword({ email, password });
                if (error) throw error;
                window.location.href = 'profile.html';
            } catch (err) {
                alert("Login Failed: " + err.message);
                btn.innerText = "SIGN IN";
                btn.disabled = false;
            }
        }

        async function handleRegister() {
            const btn = document.getElementById('btn-reg');
            const name = sanitize(document.getElementById('reg-name').value.trim());
            const email = sanitize(document.getElementById('reg-email').value.trim());
            const password = document.getElementById('reg-password').value;

            // Robust validation
            if(password.length < 8) {
                alert("Password must be at least 8 characters long.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "SECURING ACCOUNT...";
            
            try {
                const { error } = await client.auth.signUp({
                    email, 
                    password, 
                    options: { data: { full_name: name } }
                });
                if (error) throw error;
                alert("Registration successful! Please verify your email.");
                switchForm('signin');
            } catch (err) {
                alert("Registration Error: " + err.message);
            } finally {
                btn.innerText = "CREATE ACCOUNT";
                btn.disabled = false;
            }
        }


async function signInWithGoogle() {
    const { data, error } = await client.auth.signInWithOAuth({
        provider: 'google',
        options: {
            // Change this to your actual profile page
            redirectTo: 'https://gearfetch.shop/profile.html' 
        }
    });

    if (error) {
        console.error("Auth Error:", error.message);
        alert("Login failed: " + error.message);
    }
}




        // Initialize session check
        document.addEventListener('DOMContentLoaded', checkSession);
    </script>
