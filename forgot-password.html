<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Gear Fetch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Ensure this path is correct relative to your root folder -->
    <script src="js/env.js"></script>
</head>
<body class="bg-white flex items-center justify-center min-h-screen">

    <div class="max-w-sm w-full p-6">
        <h1 class="text-xl font-black uppercase tracking-widest mb-2">Reset Password</h1>
        <p class="text-[12px] text-zinc-500 mb-6">Enter your email and we'll send you a link to reset your password.</p>
        
        <input type="email" id="email" placeholder="Email Address" class="w-full p-3 border border-zinc-200 rounded-lg mb-4 text-sm">
        
        <button id="reset-btn" onclick="sendResetEmail()" class="w-full bg-black text-white py-3 rounded-lg hover:bg-zinc-800 transition-all text-[10px] font-bold uppercase tracking-widest">
            Send Reset Link
        </button>
        <div id="status" class="mt-4 text-[12px] font-medium text-center"></div>
    </div>

    <script>
        // Safety check: ensure variables are loaded from env.js
        if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
            console.error("Supabase credentials missing! Check js/env.js");
            document.getElementById('status').innerText = "Configuration Error: Check console.";
        }

        const client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

        async function sendResetEmail() {
            const email = document.getElementById('email').value;
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('reset-btn');

            if (!email) {
                alert("Please enter your email.");
                return;
            }

            // UI feedback
            btn.disabled = true;
            btn.innerText = "Sending...";
            statusDiv.innerText = "";
            statusDiv.className = "mt-4 text-[12px] font-medium text-center";

            try {
                const { error } = await client.auth.resetPasswordForEmail(email, {
                    redirectTo: 'https://gearfetch.shop/update-password.html',
                });

                if (error) throw error;

                statusDiv.innerText = "Check your email for the reset link!";
                statusDiv.classList.add('text-green-600');
            } catch (err) {
                console.error("Reset error:", err);
                statusDiv.innerText = "Error: " + err.message;
                statusDiv.classList.add('text-red-600');
            } finally {
                btn.disabled = false;
                btn.innerText = "Send Reset Link";
            }
        }
    </script>
</body>
</html>
